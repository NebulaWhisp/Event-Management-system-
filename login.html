<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Event Management System</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/main.js"></script>
</head>
<body>
  <main style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <form id="loginForm" 
          style="background:var(--card); padding:2rem; border-radius:var(--radius-lg);
                 width:320px; box-shadow:0 0 15px rgba(0,0,0,0.1);" action="http://localhost/filesproject/login.php" method="post">
      <h2 style="text-align:center; margin-bottom:1rem;">Login</h2>
      <label>Email</label>
      <input type="email" id="email" required 
             style="width:100%; padding:0.5rem; margin:0.5rem 0; background:var(--input-background); border:none;">
      <label>Password</label>
      <input type="password" id="password" required 
             style="width:100%; padding:0.5rem; margin:0.5rem 0; background:var(--input-background); border:none;">
      <button type="submit" 
              style="width:100%; padding:0.75rem; margin-top:1rem; background:var(--primary); color:var(--primary-foreground); border:none; border-radius:var(--radius-sm); cursor:pointer;">
        Login
      </button>
      <p id="message" style="text-align:center; margin-top:1rem; color:var(--muted-foreground);"></p>
    </form>
  </main>
</body>
</html>
